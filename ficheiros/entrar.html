<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario-entrar</title>
    <link rel="stylesheet" href="telainicial.css">
</head>

<body>
    <section class="conteiner">
        <div class="box">
            <h1>Entrar</h1>
            <form action="telainicial.html">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>

                <div class="termos">
                    <input type="checkbox" name="aceitar_termos" id="aceitar_termos">
                    <label for="aceitar_termos">Aceitar <a href="#">.Termos e Condições</a> </label>
                </div>
                <input type="submit" value="Entrar">
                <p>Não tem uma conta? <a href="cadastrar.html">Criar conta</a></p>
            </form>
        </div>
    </section>
</body>

</html>
